version: "3.8"

services:
  person-service:
    container_name: person-service
    env_file: ./.environment
    build: .
    restart: always
    depends_on:
      - database
    ports:
      - "8080:8080"

  database:
    platform: linux/arm64/v8
    image: postgres:alpine
    env_file: ./.environment
    container_name: database
    restart: always
    ports:
      - "5432:5432"